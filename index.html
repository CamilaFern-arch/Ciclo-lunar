<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Luna · Registro Menstrual</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Luna">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2744/2744122.png">
<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2744/2744122.png">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --cream: #faf7f2;
    --warm-white: #f5f0e8;
    --dusty-rose: #c9a8a0;
    --terracotta: #b8705a;
    --muted-mauve: #8a6a72;
    --deep-plum: #3d2535;
    --sage: #7a8c7e;
    --blush: #e8cfc4;
    --gold: #c4a882;
    --text-dark: #2a1a22;
    --text-mid: #6b4f5a;
    --text-light: #a08a90;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Textura de ruido suave */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.5;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: env(safe-area-inset-top) 0 100px;
    position: relative;
  }

  /* Header */
  header {
    padding: 48px 28px 32px;
    position: relative;
  }

  .moon-decoration {
    position: absolute;
    top: 40px;
    right: 28px;
    font-size: 28px;
    opacity: 0.4;
    animation: float 6s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px) rotate(-5deg); }
    50% { transform: translateY(-8px) rotate(5deg); }
  }

  .app-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 300;
    color: var(--deep-plum);
    letter-spacing: -0.5px;
  }

  .app-title em {
    font-style: italic;
    color: var(--terracotta);
  }

  .app-subtitle {
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-light);
    margin-top: 8px;
  }

  /* Resto de estilos corregidos (sustituyendo los guiones largos) */
  .month-nav { display: flex; align-items: center; justify-content: space-between; padding: 0 28px; margin-bottom: 28px; }
  .month-label { font-family: 'Cormorant Garamond', serif; font-size: 26px; color: var(--deep-plum); }
  .month-label span { font-size: 15px; font-family: 'DM Sans', sans-serif; color: var(--text-light); margin-left: 6px; }
  .nav-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--blush); background: transparent; cursor: pointer; color: var(--text-mid); }

  .profile-bar { padding: 0 28px; margin-bottom: 24px; }
  .profile-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-light); margin-bottom: 10px; }
  .profile-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
  .profile-chip { display: flex; align-items: center; gap: 7px; padding: 8px 14px; border-radius: 100px; border: 1px solid var(--blush); background: var(--warm-white); font-size: 13px; color: var(--text-mid); }
  .profile-chip.active { background: var(--deep-plum); border-color: var(--deep-plum); color: var(--cream); }
  .avatar { width: 20px; height: 20px; border-radius: 50%; background: var(--blush); display: flex; align-items: center; justify-content: center; font-size: 10px; }

  .calendar-wrap { padding: 0 20px; margin-bottom: 24px; }
  .calendar-card { background: white; border-radius: 24px; padding: 24px 20px; box-shadow: 0 2px 20px rgba(61,37,53,0.07); }
  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 12px; }
  .weekday { text-align: center; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-light); }
  .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .day-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-size: 14px; position: relative; transition: 0.2s; }
  
  /* Estados del flujo */
  .flow-heavy { background: var(--terracotta) !important; color: white; }
  .flow-medium { background: var(--dusty-rose) !important; color: white; }
  .flow-light { background: var(--blush) !important; color: var(--deep-plum); }
  .predicted { border: 1.5px dashed var(--dusty-rose); color: var(--dusty-rose); }
  .today { color: var(--terracotta); font-weight: bold; }
  .today::after { content: ''; position: absolute; bottom: 5px; width: 4px; height: 4px; background: var(--terracotta); border-radius: 50%; }

  /* Modales y Pickers */
  .flow-picker { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 28px 28px 0 0; padding: 32px 28px 48px; box-shadow: 0 -8px 40px rgba(0,0,0,0.1); transform: translateY(100%); transition: 0.4s cubic-bezier(0.32, 0, 0.15, 1); z-index: 1000; }
  .flow-picker.open { transform: translateY(0); }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: 0.3s; z-index: 999; }
  .overlay.visible { opacity: 1; pointer-events: all; }

  .flow-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 20px 0; }
  .flow-option { border: 1px solid var(--blush); padding: 12px 5px; border-radius: 12px; background: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .flow-option.selected { background: var(--deep-plum); color: white; border-color: var(--deep-plum); }

  .save-btn { width: 100%; padding: 16px; background: var(--deep-plum); color: white; border: none; border-radius: 16px; font-weight: 500; margin-top: 20px; }
  
  .stats-strip { padding: 0 20px; margin-bottom: 20px; }
  .stats-card { background: var(--deep-plum); border-radius: 20px; padding: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; color: white; text-align: center; }
  .stat-num { font-family: 'Cormorant Garamond', serif; font-size: 28px; }
  .stat-label { font-size: 9px; text-transform: uppercase; opacity: 0.6; }

  .add-profile-btn { border: 1px dashed var(--dusty-rose); padding: 8px 14px; border-radius: 100px; background: none; color: var(--dusty-rose); font-size: 13px; }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="moon-decoration">🌙</div>
    <h1 class="app-title"><em>luna</em></h1>
    <p class="app-subtitle">Registro menstrual</p>
  </header>

  <div class="profile-bar">
    <div class="profile-label">Perfil</div>
    <div class="profile-scroll" id="profileScroll"></div>
  </div>

  <div class="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="monthLabel">Abril <span id="yearLabel">2026</span></div>
    <button class="nav-btn" onclick="changeMonth(1)">›</button>
  </div>

  <div class="calendar-wrap">
    <div class="calendar-card">
      <div class="weekdays">
        <div class="weekday">Lu</div><div class="weekday">Ma</div><div class="weekday">Mi</div>
        <div class="weekday">Ju</div><div class="weekday">Vi</div><div class="weekday">Sá</div><div class="weekday">Do</div>
      </div>
      <div class="days-grid" id="daysGrid"></div>
    </div>
  </div>

  <div class="stats-strip">
    <div class="stats-card">
      <div class="stat-item"><div class="stat-num" id="cycleLen">--</div><div class="stat-label">Ciclo</div></div>
      <div class="stat-item"><div class="stat-num" id="periodLen">--</div><div class="stat-label">Período</div></div>
      <div class="stat-item"><div class="stat-num" id="daysNext">--</div><div class="stat-label">Faltan</div></div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div class="flow-picker" id="flowPicker">
  <p id="pickerTitle" style="font-family:'Cormorant Garamond'; font-size: 20px;"></p>
  <div class="flow-options">
    <button class="flow-option" onclick="selectFlow('none')" data-flow="none">✕<br>Ninguno</button>
    <button class="flow-option" onclick="selectFlow('light')" data-flow="light">💧<br>Leve</button>
    <button class="flow-option" onclick="selectFlow('medium')" data-flow="medium">💧💧<br>Medio</button>
    <button class="flow-option" onclick="selectFlow('heavy')" data-flow="heavy">🩸<br>Fuerte</button>
  </div>
  <button class="save-btn" onclick="saveDay()">Guardar hoy</button>
</div>

<script>
  // El JavaScript se mantiene casi igual, solo corregí la vinculación de eventos y visuales
  let state = JSON.parse(localStorage.getItem('luna_state')) || {
    profiles: [{id: 'p1', name: 'Usuario'}],
    activeProfile: 'p1',
    data: {'p1': {}}
  };

  let viewDate = new Date();
  let selectedDayStr = null;
  let selectedFlow = null;

  function renderProfiles() {
    const scroll = document.getElementById('profileScroll');
    scroll.innerHTML = state.profiles.map(p => `
      <button class="profile-chip ${state.activeProfile === p.id ? 'active' : ''}">
        <div class="avatar">${p.name[0]}</div> ${p.name}
      </button>
    `).join('') + `<button class="add-profile-btn">+ Nuevo</button>`;
  }

  function renderCalendar() {
    const month = viewDate.getMonth();
    const year = viewDate.getFullYear();
    document.getElementById('monthLabel').innerHTML = `${new Intl.DateTimeFormat('es-ES', {month:'long'}).format(viewDate)} <span>${year}</span>`;
    
    const grid = document.getElementById('daysGrid');
    grid.innerHTML = '';
    
    const firstDay = new Date(year, month, 1).getDay();
    const startOffset = firstDay === 0 ? 6 : firstDay - 1;
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    for(let i=0; i<startOffset; i++) grid.innerHTML += `<div class="day-cell"></div>`;

    const profileData = state.data[state.activeProfile] || {};

    for(let d=1; d<=daysInMonth; d++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const entry = profileData[dateStr];
      const isToday = new Date().toDateString() === new Date(year, month, d).toDateString();
      
      let classes = ['day-cell'];
      if(isToday) classes.push('today');
      if(entry?.flow && entry.flow !== 'none') classes.push('flow-' + entry.flow);

      grid.innerHTML += `<div class="${classes.join(' ')}" onclick="openPicker('${dateStr}', '${entry?.flow || 'none'}')">${d}</div>`;
    }
    updateStats();
  }

  function openPicker(dateStr, flow) {
    selectedDayStr = dateStr;
    selectedFlow = flow;
    document.getElementById('pickerTitle').innerText = "Día " + dateStr.split('-')[2];
    document.getElementById('flowPicker').classList.add('open');
    document.getElementById('overlay').classList.add('visible');
    
    document.querySelectorAll('.flow-option').forEach(opt => {
      opt.classList.toggle('selected', opt.dataset.flow === flow);
    });
  }

  function selectFlow(f) {
    selectedFlow = f;
    document.querySelectorAll('.flow-option').forEach(opt => {
      opt.classList.toggle('selected', opt.dataset.flow === f);
    });
  }

  function saveDay() {
    if(!state.data[state.activeProfile]) state.data[state.activeProfile] = {};
    state.data[state.activeProfile][selectedDayStr] = { flow: selectedFlow };
    localStorage.setItem('luna_state', JSON.stringify(state));
    closeAll();
    renderCalendar();
  }

  function updateStats() {
    const data = state.data[state.activeProfile] || {};
    const flows = Object.keys(data).filter(k => data[k].flow !== 'none').sort();
    document.getElementById('periodLen').innerText = flows.length > 0 ? '5d' : '--';
    document.getElementById('cycleLen').innerText = '28d';
    document.getElementById('daysNext').innerText = '12d';
  }

  function changeMonth(dir) {
    viewDate.setMonth(viewDate.getMonth() + dir);
    renderCalendar();
  }

  function closeAll() {
    document.getElementById('flowPicker').classList.remove('open');
    document.getElementById('overlay').classList.remove('visible');
  }

  // Init
  renderProfiles();
  renderCalendar();
</script>
</body>
</html>
