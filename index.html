<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna · Registro Menstrual</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf7f2;
    --warm-white: #f5f0e8;
    --dusty-rose: #c9a8a0;
    --terracotta: #b8705a;
    --muted-mauve: #8a6a72;
    --deep-plum: #3d2535;
    --sage: #7a8c7e;
    --blush: #e8cfc4;
    --gold: #c4a882;
    --text-dark: #2a1a22;
    --text-mid: #6b4f5a;
    --text-light: #a08a90;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘DM Sans’, sans-serif;
background: var(–cream);
color: var(–text-dark);
min-height: 100vh;
overflow-x: hidden;
}

/* Noise texture overlay */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘noise’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23noise)’ opacity=‘0.04’/%3E%3C/svg%3E”);
pointer-events: none;
z-index: 1000;
opacity: 0.5;
}

.app {
max-width: 480px;
margin: 0 auto;
padding: 0 0 100px;
position: relative;
}

/* Header */
header {
padding: 48px 28px 32px;
position: relative;
}

.moon-decoration {
position: absolute;
top: 20px;
right: 28px;
font-size: 28px;
opacity: 0.4;
animation: float 6s ease-in-out infinite;
}

@keyframes float {
0%, 100% { transform: translateY(0px) rotate(-5deg); }
50% { transform: translateY(-8px) rotate(5deg); }
}

.app-title {
font-family: ‘Cormorant Garamond’, serif;
font-size: 42px;
font-weight: 300;
color: var(–deep-plum);
letter-spacing: -0.5px;
line-height: 1;
}

.app-title em {
font-style: italic;
color: var(–terracotta);
}

.app-subtitle {
font-size: 12px;
letter-spacing: 2.5px;
text-transform: uppercase;
color: var(–text-light);
margin-top: 8px;
font-weight: 300;
}

/* Month nav */
.month-nav {
display: flex;
align-items: center;
justify-content: space-between;
padding: 0 28px;
margin-bottom: 28px;
}

.month-label {
font-family: ‘Cormorant Garamond’, serif;
font-size: 26px;
font-weight: 400;
color: var(–deep-plum);
letter-spacing: 0.3px;
}

.month-label span {
font-size: 15px;
font-family: ‘DM Sans’, sans-serif;
color: var(–text-light);
font-weight: 300;
margin-left: 6px;
}

.nav-btn {
width: 36px;
height: 36px;
border-radius: 50%;
border: 1px solid var(–blush);
background: transparent;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
color: var(–text-mid);
font-size: 16px;
transition: all 0.2s ease;
}

.nav-btn:hover {
background: var(–blush);
border-color: var(–dusty-rose);
}

/* Profile selector */
.profile-bar {
padding: 0 28px;
margin-bottom: 24px;
}

.profile-label {
font-size: 11px;
letter-spacing: 2px;
text-transform: uppercase;
color: var(–text-light);
margin-bottom: 10px;
}

.profile-scroll {
display: flex;
gap: 10px;
overflow-x: auto;
padding-bottom: 4px;
scrollbar-width: none;
}

.profile-scroll::-webkit-scrollbar { display: none; }

.profile-chip {
display: flex;
align-items: center;
gap: 7px;
padding: 8px 14px;
border-radius: 100px;
border: 1px solid var(–blush);
background: var(–warm-white);
cursor: pointer;
white-space: nowrap;
transition: all 0.2s;
font-size: 13px;
color: var(–text-mid);
}

.profile-chip.active {
background: var(–deep-plum);
border-color: var(–deep-plum);
color: var(–cream);
}

.profile-chip .avatar {
width: 20px;
height: 20px;
border-radius: 50%;
background: var(–blush);
display: flex;
align-items: center;
justify-content: center;
font-size: 10px;
font-weight: 500;
}

.profile-chip.active .avatar {
background: rgba(255,255,255,0.2);
}

.add-profile-btn {
display: flex;
align-items: center;
gap: 7px;
padding: 8px 14px;
border-radius: 100px;
border: 1px dashed var(–dusty-rose);
background: transparent;
cursor: pointer;
white-space: nowrap;
font-size: 13px;
color: var(–dusty-rose);
font-family: ‘DM Sans’, sans-serif;
transition: all 0.2s;
}

.add-profile-btn:hover {
background: var(–blush);
}

/* Calendar */
.calendar-wrap {
padding: 0 20px;
margin-bottom: 24px;
}

.calendar-card {
background: white;
border-radius: 24px;
padding: 24px 20px;
box-shadow: 0 2px 20px rgba(61,37,53,0.07), 0 0 0 1px rgba(201,168,160,0.15);
}

.weekdays {
display: grid;
grid-template-columns: repeat(7, 1fr);
margin-bottom: 12px;
}

.weekday {
text-align: center;
font-size: 10px;
letter-spacing: 1.5px;
text-transform: uppercase;
color: var(–text-light);
font-weight: 500;
padding: 6px 0;
}

.days-grid {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 3px;
}

.day-cell {
aspect-ratio: 1;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
border-radius: 12px;
position: relative;
transition: all 0.15s ease;
font-size: 14px;
font-weight: 400;
color: var(–text-dark);
user-select: none;
}

.day-cell:hover:not(.empty) {
background: var(–warm-white);
}

.day-cell.empty {
cursor: default;
}

.day-cell.today {
font-weight: 500;
color: var(–terracotta);
}

.day-cell.today::after {
content: ‘’;
position: absolute;
bottom: 5px;
left: 50%;
transform: translateX(-50%);
width: 4px;
height: 4px;
border-radius: 50%;
background: var(–terracotta);
}

.day-cell.marked {
background: var(–deep-plum);
color: white;
font-weight: 500;
}

.day-cell.marked:hover {
background: var(–muted-mauve);
}

.day-cell.flow-heavy {
background: var(–terracotta);
color: white;
}

.day-cell.flow-medium {
background: var(–dusty-rose);
color: white;
}

.day-cell.flow-light {
background: var(–blush);
color: var(–deep-plum);
}

.day-cell.predicted {
background: transparent;
border: 1.5px dashed var(–dusty-rose);
color: var(–dusty-rose);
}

/* Flow picker popup */
.flow-picker {
position: fixed;
bottom: 0;
left: 0;
right: 0;
background: white;
border-radius: 28px 28px 0 0;
padding: 32px 28px 48px;
box-shadow: 0 -8px 40px rgba(61,37,53,0.15);
z-index: 100;
transform: translateY(100%);
transition: transform 0.35s cubic-bezier(0.32, 0, 0.15, 1);
}

.flow-picker.open {
transform: translateY(0);
}

.picker-handle {
width: 36px;
height: 4px;
background: var(–blush);
border-radius: 2px;
margin: 0 auto 24px;
}

.picker-title {
font-family: ‘Cormorant Garamond’, serif;
font-size: 22px;
color: var(–deep-plum);
margin-bottom: 4px;
}

.picker-date {
font-size: 12px;
color: var(–text-light);
letter-spacing: 1px;
margin-bottom: 24px;
}

.flow-options {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 10px;
margin-bottom: 24px;
}

.flow-option {
display: flex;
flex-direction: column;
align-items: center;
gap: 8px;
padding: 16px 8px;
border-radius: 16px;
border: 1.5px solid var(–blush);
cursor: pointer;
transition: all 0.2s;
background: transparent;
font-family: ‘DM Sans’, sans-serif;
}

.flow-option:hover { background: var(–warm-white); }

.flow-option.selected {
border-color: var(–deep-plum);
background: var(–deep-plum);
color: white;
}

.flow-dot {
width: 28px;
height: 28px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
}

.flow-option-label {
font-size: 11px;
color: var(–text-mid);
font-weight: 400;
letter-spacing: 0.3px;
}

.flow-option.selected .flow-option-label {
color: rgba(255,255,255,0.8);
}

.symptoms-section {
margin-bottom: 24px;
}

.symptoms-title {
font-size: 11px;
letter-spacing: 2px;
text-transform: uppercase;
color: var(–text-light);
margin-bottom: 12px;
}

.symptoms-grid {
display: flex;
flex-wrap: wrap;
gap: 8px;
}

.symptom-tag {
padding: 7px 14px;
border-radius: 100px;
border: 1px solid var(–blush);
font-size: 12px;
color: var(–text-mid);
cursor: pointer;
transition: all 0.2s;
background: transparent;
font-family: ‘DM Sans’, sans-serif;
}

.symptom-tag.selected {
background: var(–muted-mauve);
border-color: var(–muted-mauve);
color: white;
}

.save-btn {
width: 100%;
padding: 16px;
background: var(–deep-plum);
color: white;
border: none;
border-radius: 16px;
font-family: ‘DM Sans’, sans-serif;
font-size: 15px;
font-weight: 500;
cursor: pointer;
letter-spacing: 0.3px;
transition: all 0.2s;
}

.save-btn:hover { background: var(–muted-mauve); }

/* Stats strip */
.stats-strip {
padding: 0 20px;
margin-bottom: 20px;
}

.stats-card {
background: var(–deep-plum);
border-radius: 20px;
padding: 20px 24px;
display: grid;
grid-template-columns: 1fr 1fr 1fr;
gap: 0;
position: relative;
overflow: hidden;
}

.stats-card::before {
content: ‘’;
position: absolute;
right: -20px;
top: -30px;
width: 120px;
height: 120px;
border-radius: 50%;
background: rgba(255,255,255,0.04);
}

.stat-item {
text-align: center;
position: relative;
}

.stat-item:not(:last-child)::after {
content: ‘’;
position: absolute;
right: 0;
top: 10%;
height: 80%;
width: 1px;
background: rgba(255,255,255,0.1);
}

.stat-num {
font-family: ‘Cormorant Garamond’, serif;
font-size: 30px;
font-weight: 300;
color: white;
line-height: 1;
margin-bottom: 4px;
}

.stat-label {
font-size: 10px;
letter-spacing: 1.5px;
text-transform: uppercase;
color: rgba(255,255,255,0.45);
}

/* Legend */
.legend {
padding: 0 28px;
margin-bottom: 20px;
display: flex;
gap: 16px;
flex-wrap: wrap;
}

.legend-item {
display: flex;
align-items: center;
gap: 6px;
font-size: 11px;
color: var(–text-light);
}

.legend-dot {
width: 10px;
height: 10px;
border-radius: 50%;
}

/* Notes section */
.notes-section {
padding: 0 20px;
}

.section-header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 0 4px;
margin-bottom: 14px;
}

.section-title {
font-family: ‘Cormorant Garamond’, serif;
font-size: 20px;
color: var(–deep-plum);
}

.note-card {
background: white;
border-radius: 16px;
padding: 16px 18px;
box-shadow: 0 1px 10px rgba(61,37,53,0.06);
margin-bottom: 10px;
border-left: 3px solid var(–dusty-rose);
transition: all 0.2s;
}

.note-card:hover { transform: translateX(2px); }

.note-date {
font-size: 10px;
letter-spacing: 1.5px;
text-transform: uppercase;
color: var(–text-light);
margin-bottom: 5px;
}

.note-text {
font-size: 13px;
color: var(–text-mid);
line-height: 1.5;
}

/* Overlay */
.overlay {
position: fixed;
inset: 0;
background: rgba(61,37,53,0.4);
z-index: 99;
opacity: 0;
pointer-events: none;
transition: opacity 0.3s;
backdrop-filter: blur(2px);
}

.overlay.visible {
opacity: 1;
pointer-events: all;
}

/* Add profile modal */
.modal {
position: fixed;
inset: 0;
z-index: 200;
display: flex;
align-items: flex-end;
pointer-events: none;
opacity: 0;
transition: opacity 0.3s;
}

.modal.open {
opacity: 1;
pointer-events: all;
}

.modal-card {
background: white;
border-radius: 28px 28px 0 0;
padding: 32px 28px 48px;
width: 100%;
transform: translateY(100%);
transition: transform 0.35s cubic-bezier(0.32, 0, 0.15, 1);
}

.modal.open .modal-card { transform: translateY(0); }

.modal-title {
font-family: ‘Cormorant Garamond’, serif;
font-size: 24px;
color: var(–deep-plum);
margin-bottom: 20px;
}

.input-group {
margin-bottom: 16px;
}

.input-label {
font-size: 11px;
letter-spacing: 1.5px;
text-transform: uppercase;
color: var(–text-light);
display: block;
margin-bottom: 8px;
}

.input-field {
width: 100%;
padding: 14px 16px;
border: 1.5px solid var(–blush);
border-radius: 12px;
font-family: ‘DM Sans’, sans-serif;
font-size: 15px;
color: var(–text-dark);
background: var(–warm-white);
outline: none;
transition: border-color 0.2s;
}

.input-field:focus { border-color: var(–dusty-rose); }

.input-field::placeholder { color: var(–text-light); }
</style>

</head>
<body>
<div class="app">
  <header>
    <div class="moon-decoration">🌙</div>
    <h1 class="app-title"><em>luna</em></h1>
    <p class="app-subtitle">Registro menstrual</p>
  </header>

  <!-- Profile selector -->

  <div class="profile-bar">
    <div class="profile-label">Perfil</div>
    <div class="profile-scroll" id="profileScroll">
      <button class="add-profile-btn" onclick="openProfileModal()">
        + Agregar
      </button>
    </div>
  </div>

  <!-- Month navigation -->

  <div class="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
    <div>
      <span class="month-label" id="monthLabel">Abril <span id="yearLabel">2026</span></span>
    </div>
    <button class="nav-btn" onclick="changeMonth(1)">›</button>
  </div>

  <!-- Calendar -->

  <div class="calendar-wrap">
    <div class="calendar-card">
      <div class="weekdays">
        <div class="weekday">Lu</div>
        <div class="weekday">Ma</div>
        <div class="weekday">Mi</div>
        <div class="weekday">Ju</div>
        <div class="weekday">Vi</div>
        <div class="weekday">Sá</div>
        <div class="weekday">Do</div>
      </div>
      <div class="days-grid" id="daysGrid"></div>
    </div>
  </div>

  <!-- Legend -->

  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--terracotta)"></div>
      Flujo abundante
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--dusty-rose)"></div>
      Flujo moderado
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--blush); border: 1px solid var(--dusty-rose)"></div>
      Flujo leve
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:transparent; border: 1.5px dashed var(--dusty-rose)"></div>
      Predicción
    </div>
  </div>

  <!-- Stats -->

  <div class="stats-strip">
    <div class="stats-card">
      <div class="stat-item">
        <div class="stat-num" id="cycleLen">–</div>
        <div class="stat-label">Días ciclo</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="periodLen">–</div>
        <div class="stat-label">Días período</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="daysNext">–</div>
        <div class="stat-label">Próximo</div>
      </div>
    </div>
  </div>

  <!-- Notes -->

  <div class="notes-section">
    <div class="section-header">
      <div class="section-title">Notas del mes</div>
    </div>
    <div id="notesList"></div>
  </div>
</div>

<!-- Overlay -->

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<!-- Flow picker -->

<div class="flow-picker" id="flowPicker">
  <div class="picker-handle"></div>
  <div class="picker-title" id="pickerTitle">Marcar día</div>
  <div class="picker-date" id="pickerDate"></div>

  <div class="flow-options">
    <button class="flow-option" onclick="selectFlow('none')" data-flow="none">
      <div class="flow-dot" style="background:var(--warm-white); border:1.5px solid var(--blush); font-size:14px">✕</div>
      <div class="flow-option-label">Ninguno</div>
    </button>
    <button class="flow-option" onclick="selectFlow('light')" data-flow="light">
      <div class="flow-dot" style="background:var(--blush)"></div>
      <div class="flow-option-label">Leve</div>
    </button>
    <button class="flow-option" onclick="selectFlow('medium')" data-flow="medium">
      <div class="flow-dot" style="background:var(--dusty-rose)"></div>
      <div class="flow-option-label">Moderado</div>
    </button>
    <button class="flow-option" onclick="selectFlow('heavy')" data-flow="heavy">
      <div class="flow-dot" style="background:var(--terracotta)"></div>
      <div class="flow-option-label">Abundante</div>
    </button>
  </div>

  <div class="symptoms-section">
    <div class="symptoms-title">Síntomas</div>
    <div class="symptoms-grid">
      <button class="symptom-tag" onclick="toggleSymptom(this)">Cólicos</button>
      <button class="symptom-tag" onclick="toggleSymptom(this)">Dolor de cabeza</button>
      <button class="symptom-tag" onclick="toggleSymptom(this)">Hinchazón</button>
      <button class="symptom-tag" onclick="toggleSymptom(this)">Cansancio</button>
      <button class="symptom-tag" onclick="toggleSymptom(this)">Náuseas</button>
      <button class="symptom-tag" onclick="toggleSymptom(this)">Cambios de humor</button>
      <button class="symptom-tag" onclick="toggleSymptom(this)">Acné</button>
      <button class="symptom-tag" onclick="toggleSymptom(this)">Sensibilidad</button>
    </div>
  </div>

<button class="save-btn" onclick="saveDay()">Guardar registro</button>

</div>

<!-- Add profile modal -->

<div class="modal" id="profileModal">
  <div class="modal-card">
    <div class="picker-handle"></div>
    <div class="modal-title">Nuevo perfil</div>
    <div class="input-group">
      <label class="input-label">Nombre</label>
      <input type="text" class="input-field" id="profileNameInput" placeholder="ej. María" maxlength="20">
    </div>
    <div class="input-group">
      <label class="input-label">Fecha de nacimiento</label>
      <input type="date" class="input-field" id="profileDobInput">
    </div>
    <button class="save-btn" onclick="saveProfile()" style="margin-top:8px">Crear perfil</button>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────
  let state = JSON.parse(localStorage.getItem('luna_state') || 'null') || {
    profiles: [],
    activeProfile: null,
    data: {}  // data[profileId][YYYY-MM-DD] = { flow, symptoms }
  };

  let currentDate = new Date();
  let viewYear = currentDate.getFullYear();
  let viewMonth = currentDate.getMonth(); // 0-indexed
  let selectedDay = null;
  let selectedFlow = null;
  let selectedSymptoms = [];

  const MONTHS_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                     'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const today = new Date();

  // ── Persistence ────────────────────────────────────────────────────────
  function save() {
    localStorage.setItem('luna_state', JSON.stringify(state));
  }

  // ── Profiles ───────────────────────────────────────────────────────────
  function renderProfiles() {
    const scroll = document.getElementById('profileScroll');
    scroll.innerHTML = '';

    state.profiles.forEach(p => {
      const chip = document.createElement('button');
      chip.className = 'profile-chip' + (state.activeProfile === p.id ? ' active' : '');
      chip.innerHTML = `<div class="avatar">${p.name[0].toUpperCase()}</div>${p.name}`;
      chip.onclick = () => switchProfile(p.id);
      scroll.appendChild(chip);
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'add-profile-btn';
    addBtn.textContent = '+ Agregar';
    addBtn.onclick = openProfileModal;
    scroll.appendChild(addBtn);
  }

  function switchProfile(id) {
    state.activeProfile = id;
    save();
    renderProfiles();
    renderCalendar();
    renderStats();
    renderNotes();
  }

  function openProfileModal() {
    document.getElementById('profileModal').classList.add('open');
    document.getElementById('overlay').classList.add('visible');
    document.getElementById('profileNameInput').value = '';
    document.getElementById('profileDobInput').value = '';
    setTimeout(() => document.getElementById('profileNameInput').focus(), 400);
  }

  function saveProfile() {
    const name = document.getElementById('profileNameInput').value.trim();
    if (!name) return;
    const id = 'p_' + Date.now();
    state.profiles.push({ id, name, dob: document.getElementById('profileDobInput').value });
    if (!state.activeProfile) state.activeProfile = id;
    state.data[id] = {};
    save();
    closeAll();
    renderProfiles();
    renderCalendar();
    renderStats();
    renderNotes();
  }

  // ── Calendar ───────────────────────────────────────────────────────────
  function changeMonth(dir) {
    viewMonth += dir;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    renderCalendar();
    renderStats();
    renderNotes();
  }

  function renderCalendar() {
    document.getElementById('monthLabel').childNodes[0].nodeValue = MONTHS_ES[viewMonth] + ' ';
    document.getElementById('yearLabel').textContent = viewYear;

    const grid = document.getElementById('daysGrid');
    grid.innerHTML = '';

    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    const offset = (firstDay === 0) ? 6 : firstDay - 1; // Mon start
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

    const profileData = state.activeProfile ? (state.data[state.activeProfile] || {}) : {};
    const predicted = getPredictedDays();

    // Empty cells
    for (let i = 0; i < offset; i++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell empty';
      grid.appendChild(cell);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell';

      const dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const entry = profileData[dateStr];
      const isToday = (d === today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear());

      if (isToday) cell.classList.add('today');

      if (entry && entry.flow && entry.flow !== 'none') {
        cell.classList.add('flow-' + entry.flow);
      } else if (predicted.includes(d)) {
        cell.classList.add('predicted');
      }

      cell.textContent = d;

      if (state.activeProfile) {
        cell.onclick = () => openDayPicker(d, dateStr, entry);
      }

      grid.appendChild(cell);
    }
  }

  function getPredictedDays() {
    if (!state.activeProfile) return [];
    const data = state.data[state.activeProfile] || {};

    // Find all period start dates
    const entries = Object.keys(data)
      .filter(k => data[k].flow && data[k].flow !== 'none')
      .sort();

    if (entries.length < 2) return [];

    // Rough cycle length from first to last marked
    const first = new Date(entries[0]);
    const last = new Date(entries[entries.length - 1]);
    const diffDays = Math.round((last - first) / 86400000);
    const cycleLen = Math.max(21, Math.min(35, diffDays > 5 ? diffDays : 28));

    const nextStart = new Date(last);
    nextStart.setDate(nextStart.getDate() + cycleLen);

    const predicted = [];
    for (let i = 0; i < 5; i++) {
      const d = new Date(nextStart);
      d.setDate(d.getDate() + i);
      if (d.getFullYear() === viewYear && d.getMonth() === viewMonth) {
        predicted.push(d.getDate());
      }
    }
    return predicted;
  }

  // ── Day Picker ─────────────────────────────────────────────────────────
  function openDayPicker(day, dateStr, entry) {
    selectedDay = dateStr;
    selectedFlow = entry?.flow || null;
    selectedSymptoms = entry?.symptoms ? [...entry.symptoms] : [];

    const dayNames = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
    const d = new Date(dateStr);
    document.getElementById('pickerTitle').textContent = `${dayNames[d.getDay()]} ${day}`;
    document.getElementById('pickerDate').textContent = `${MONTHS_ES[viewMonth]} ${viewYear}`.toUpperCase();

    // Update flow buttons
    document.querySelectorAll('.flow-option').forEach(btn => {
      btn.classList.toggle('selected', btn.dataset.flow === selectedFlow);
    });

    // Update symptom tags
    document.querySelectorAll('.symptom-tag').forEach(tag => {
      tag.classList.toggle('selected', selectedSymptoms.includes(tag.textContent));
    });

    document.getElementById('flowPicker').classList.add('open');
    document.getElementById('overlay').classList.add('visible');
  }

  function selectFlow(flow) {
    selectedFlow = flow;
    document.querySelectorAll('.flow-option').forEach(btn => {
      btn.classList.toggle('selected', btn.dataset.flow === flow);
    });
  }

  function toggleSymptom(el) {
    el.classList.toggle('selected');
    const s = el.textContent;
    if (selectedSymptoms.includes(s)) {
      selectedSymptoms = selectedSymptoms.filter(x => x !== s);
    } else {
      selectedSymptoms.push(s);
    }
  }

  function saveDay() {
    if (!selectedDay || !state.activeProfile) return;
    if (!state.data[state.activeProfile]) state.data[state.activeProfile] = {};

    if (!selectedFlow || selectedFlow === 'none') {
      delete state.data[state.activeProfile][selectedDay];
    } else {
      state.data[state.activeProfile][selectedDay] = {
        flow: selectedFlow,
        symptoms: [...selectedSymptoms]
      };
    }

    save();
    closeAll();
    renderCalendar();
    renderStats();
    renderNotes();
  }

  // ── Stats ──────────────────────────────────────────────────────────────
  function renderStats() {
    if (!state.activeProfile) {
      document.getElementById('cycleLen').textContent = '–';
      document.getElementById('periodLen').textContent = '–';
      document.getElementById('daysNext').textContent = '–';
      return;
    }

    const data = state.data[state.activeProfile] || {};
    const monthKeys = Object.keys(data)
      .filter(k => data[k].flow && data[k].flow !== 'none')
      .sort();

    const thisMonth = monthKeys.filter(k => {
      const d = new Date(k);
      return d.getFullYear() === viewYear && d.getMonth() === viewMonth;
    });

    document.getElementById('periodLen').textContent = thisMonth.length || '–';

    if (monthKeys.length >= 2) {
      const first = new Date(monthKeys[0]);
      const last = new Date(monthKeys[monthKeys.length - 1]);
      const diff = Math.round((last - first) / 86400000);
      const cycle = diff > 5 ? diff : 28;
      document.getElementById('cycleLen').textContent = cycle;

      const next = new Date(last);
      next.setDate(next.getDate() + cycle);
      const daysTo = Math.round((next - today) / 86400000);
      document.getElementById('daysNext').textContent = daysTo > 0 ? `${daysTo}d` : 'Hoy';
    } else {
      document.getElementById('cycleLen').textContent = '–';
      document.getElementById('daysNext').textContent = '–';
    }
  }

  // ── Notes ──────────────────────────────────────────────────────────────
  function renderNotes() {
    const list = document.getElementById('notesList');
    list.innerHTML = '';

    if (!state.activeProfile) return;

    const data = state.data[state.activeProfile] || {};
    const monthEntries = Object.keys(data)
      .filter(k => {
        const d = new Date(k);
        return d.getFullYear() === viewYear && d.getMonth() === viewMonth &&
               data[k].symptoms && data[k].symptoms.length > 0;
      })
      .sort();

    if (monthEntries.length === 0) {
      list.innerHTML = '<p style="font-size:13px;color:var(--text-light);padding:0 4px">Sin síntomas registrados este mes.</p>';
      return;
    }

    monthEntries.forEach(k => {
      const entry = data[k];
      const d = new Date(k);
      const card = document.createElement('div');
      card.className = 'note-card';
      card.innerHTML = `
        <div class="note-date">${d.getDate()} de ${MONTHS_ES[d.getMonth()]}</div>
        <div class="note-text">${entry.symptoms.join(' · ')}</div>
      `;
      list.appendChild(card);
    });
  }

  // ── Close ──────────────────────────────────────────────────────────────
  function closeAll() {
    document.getElementById('flowPicker').classList.remove('open');
    document.getElementById('profileModal').classList.remove('open');
    document.getElementById('overlay').classList.remove('visible');
  }

  // ── Init ───────────────────────────────────────────────────────────────
  renderProfiles();
  renderCalendar();
  renderStats();
  renderNotes();
</script>

</body>
</html>
